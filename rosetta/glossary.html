body {

.topnav {
    overflow: hidden;
    background-color: #333;
    border-radius: 30px;
}

.topnav a {
    float: left;
    color: #f2f2f2;
    text-align: center;
    padding: 14px 16px;
    text-decoration: none;
    font-size: 17px;
    border-radius: 30px;
}

.topnav a:hover {
    background-color: #ddd;
    color: k;
}

.container {
    border: 2px solid #787878;
    border-radius: 30px;
    padding: 10px;
    color: #FFFFFF;
    background-color: #333;
}

.inner {
    border: 2px solid #787878;
    border-radius: 30px;
    padding: 10px;
    color: #FFFFFF;
    background-color: #333;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    align-items: center;
    gap: 5px;
}

.credit {
    color: #818181;
    position: fixed;
    bottom: 0;
    left: 0;
}

.symbol {
    border: 2px solid #787878;
    border-radius: 30px;
    padding: 10px;
    color: #FFFFFF;
    background-color: #4b4b4b;

    flex-direction: column;
    align-items: center;
    gap: 5px;
}

.output {
    border: 2px solid #787878;

    padding: 10px;

    align-items: center;
}

    padding: 10px;
    color: #ffffff;
    background-color: #8f8f8f;
    display: flex;
    flex-direction: column;
    align-items: center;

}

.topnav a.active {

}
