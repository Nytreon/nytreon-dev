<!DOCTYPE html>
<html>
<head>
<title>Project Rosetta</title>
<!-- <link rel="icon" type="image/x-icon" href="https://static.wikitide.net/rainworldwiki/0/06/Karma_10_icon.png"> -->
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body {
    margin: 0;
    font-family: Arial, Helvetica, sans-serif;
    background-color: #1a1a1a;
}

.topnav {
    overflow: hidden;
    background-color: #333;
    border-radius: 30px;
}

.topnav a {
    float: left;
    color: #f2f2f2;
    text-align: center;
    padding: 14px 16px;
    text-decoration: none;
    font-size: 17px;
    border-radius: 30px;
}

.topnav a:hover {
    background-color: #ddd;
    color: k;
}

.container {
    border: 2px solid #787878;
    border-radius: 30px;
    padding: 10px;
    color: #FFFFFF;
    background-color: #333;
}

.inner {
    border: 2px solid #787878;
    border-radius: 30px;
    padding: 10px;
    color: #FFFFFF;
    background-color: #333;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    align-items: center;
    gap: 5px;
}

.credit {
    color: #818181;
    position: absolute;
    bottom: 0;
    left: 0;
}

.symbol {
    border: 2px solid #787878;
    border-radius: 30px;
    padding: 10px;
    color: #FFFFFF;
    background-color: #4b4b4b;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
}

.symbol:hover {
    cursor: pointer;
    border: 2px solid #787878;
    border-radius: 30px;
    padding: 10px;
    color: #ffffff;
    background-color: #8f8f8f;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
}

.topnav a.active {
    background-color: #787878;
    color: white;
}
</style>
</head>
<body>

<div class="topnav">
    <a href="https://nytreon.dev/rosetta">Home</a>
    <a class="active" href="https://nytreon.dev/rosetta/glossary">Glossary</a>
    <a href="https://nytreon.dev/rosetta/docs">Docs</a>
    <a href="https://nytreon.dev/rosetta/about">About</a>
    <a href="https://discord.gg/U7BtCEkH6h" style="right: 0px; position: absolute;">Discord</a>
</div>
<br>
<div class="container">
    <div class="inner">

        <div class="symbol" onclick="K1()">
            <p style="margin-bottom: 0;">K1</p>
            <img width="100" height="100" src="./media/karma1-o.svg"></img>
        </div>
        <div class="symbol" onclick="K2()">
            <p style="margin-bottom: 0;">K2</p>
            <img width="100" height="100" src="./media/karma2-o.svg"></img>
        </div>
        <div class="symbol" onclick="K3()">
            <p style="margin-bottom: 0;">K3</p>
            <img width="100" height="100" src="./media/karma3-o.svg"></img>
        </div>
        <div class="symbol" onclick="K4()">
            <p style="margin-bottom: 0;">K4</p>
            <img width="100" height="100" src="./media/karma4-o.svg"></img>
        </div>
        <div class="symbol" onclick="monk()">
            <p style="margin-bottom: 0;">The Monk</p>
            <img width="100" height="100" src="./media/monk-o.svg"></img>
        </div>

    </div>
    <br>
    <div class="inner" id="output">
        <h3>No symbol selected.</h1>
    </div>
</div>
<p class="credit">Credit to kiwi for making the SVGs</p>
</body>
<script>
function setInfo(HTML) {
    if (HTML !== "") { 
        document.getElementById("output").innerHTML = HTML;
    } else {
        document.getElementById("output").innerHTML = "<h3>No info yet.</h3>";
    }
}
function K1() {

    const htmlToSet = `<h3>Karma 1</h3>`;

    setInfo(htmlToSet);

}
function K2() {

    const htmlToSet = `<h3>Karma 2</h3>`;

    setInfo(htmlToSet);

}
function K3() {

    const htmlToSet = `<h3>Karma 3</h3>`;

    setInfo(htmlToSet);

}
function K4() {

    const htmlToSet = `<h3>Karma 4</h3>`;

    setInfo(htmlToSet);

}
function monk() {

    const htmlToSet = `<h3>Karma 4</h3>`;

    setInfo(htmlToSet);

}
</script>
</html>
